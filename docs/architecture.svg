<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="420" fill="#f8fafc"/>
  <text x="410" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">VehicleBrokerService — Binder/AIDL IPC</text>
  <text x="410" y="60" text-anchor="middle" font-size="13" fill="#64748b">Three processes communicating over Binder</text>

  <!-- Producer -->
  <rect x="40" y="120" width="190" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="135" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">ProducerApp</text>
  <text x="135" y="172" text-anchor="middle" font-size="11" fill="#64748b">Process 1</text>
  <text x="135" y="196" text-anchor="middle" font-size="11" fill="#334155">Publishes telemetry</text>
  <text x="135" y="212" text-anchor="middle" font-size="11" fill="#334155">speed · rpm · fuel</text>
  <text x="135" y="228" text-anchor="middle" font-size="11" fill="#334155">at 2 Hz</text>

  <!-- Broker -->
  <rect x="315" y="110" width="190" height="140" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="410" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">BrokerService</text>
  <text x="410" y="162" text-anchor="middle" font-size="11" fill="#64748b">Process 2 · bound Service</text>
  <text x="410" y="188" text-anchor="middle" font-size="11" fill="#334155">IVehicleBroker.Stub</text>
  <text x="410" y="206" text-anchor="middle" font-size="11" fill="#334155">RemoteCallbackList</text>
  <text x="410" y="224" text-anchor="middle" font-size="11" fill="#334155">fan-out to subscribers</text>

  <!-- Consumers -->
  <rect x="590" y="80" width="190" height="100" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="685" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">ConsumerApp</text>
  <text x="685" y="128" text-anchor="middle" font-size="11" fill="#64748b">Process 3</text>
  <text x="685" y="150" text-anchor="middle" font-size="11" fill="#334155">Registers callback,</text>
  <text x="685" y="166" text-anchor="middle" font-size="11" fill="#334155">renders live data</text>

  <rect x="590" y="200" width="190" height="100" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="685" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#94a3b8">ConsumerApp (restricted)</text>
  <text x="685" y="248" text-anchor="middle" font-size="11" fill="#94a3b8">Process 4 · planned</text>
  <text x="685" y="270" text-anchor="middle" font-size="11" fill="#94a3b8">permission-gated</text>
  <text x="685" y="286" text-anchor="middle" font-size="11" fill="#94a3b8">access</text>

  <!-- Producer -> Broker (publish) -->
  <line x1="230" y1="172" x2="312" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="271" y="162" text-anchor="middle" font-size="10" fill="#475569">publish()</text>
  <text x="271" y="188" text-anchor="middle" font-size="9" fill="#94a3b8">oneway</text>

  <!-- Consumer -> Broker (subscribe) -->
  <line x1="588" y1="120" x2="508" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="548" y="124" text-anchor="middle" font-size="10" fill="#475569">subscribe()</text>

  <!-- Broker -> Consumer (callback push) -->
  <line x1="508" y1="178" x2="588" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="548" y="172" text-anchor="middle" font-size="10" fill="#2563eb">onVehicleData()</text>

  <!-- shared contract note -->
  <rect x="250" y="320" width="320" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="410" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">aidl-contract (shared library module)</text>
  <text x="410" y="365" text-anchor="middle" font-size="10.5" fill="#4338ca">IVehicleBroker · IVehicleCallback · VehicleData</text>
</svg>
